<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signals & Systems Basics</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298, #ff512f, #dd2476);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      color: white;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    nav {
      background: rgba(0, 0, 0, 0.7);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .logo {
      font-size: 1.4rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    main {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h2 {
      margin-bottom: 30px;
      color: #ffe600;
      font-size: 2rem;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
    }

    .sets {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
      max-width: 500px;
      width: 100%;
    }

    .set-btn {
      padding: 30px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 15px;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      font-weight: bold;
      transition: transform 0.3s, background 0.3s;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .set-btn:hover {
      transform: translateY(-8px) scale(1.05);
      background: rgba(255, 255, 255, 0.25);
    }

    footer {
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      text-align: center;
      font-size: 0.9rem;
      box-shadow: 0 -3px 8px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">Logic Gates</div>
    <a href="digital-circuit.html" style="color:white; text-decoration:none;">⬅ Back</a>
  </nav>

  <main>
    <h2>Select a Set</h2>
    <div class="sets">
      <a href="dcd_lg_set1.html" class="set-btn">Set 1</a>
      <a href="#" class="set-btn">Set 2</a>
      <a href="#" class="set-btn">Set 3</a>
      <a href="#" class="set-btn">Set 4</a>
    </div>
  </main>

  <footer>
    &copy; 2027 Batch Placement Portal | All Rights Reserved
  </footer>
</body>
</html>
